services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: smbarc-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:3000"
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/data/prod.db
    deploy:
      resources:
        limits:
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app_data:
